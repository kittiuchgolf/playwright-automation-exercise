name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run API tests
        run: npx playwright test --project=api
        env:
          CI: 'true'
      - name: Test summary
        if: always()
        run: node scripts/ci-summary.mjs api
      - name: Upload API HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14
      - name: Upload API Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 14

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run web tests
        run: npx playwright test --project=web --grep-invert @quarantine
        env:
          CI: 'true'
      - name: Test summary
        if: always()
        run: node scripts/ci-summary.mjs web
      - name: Upload web HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web
          path: playwright-report/
          retention-days: 14
      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-web
          path: allure-results/
          retention-days: 14

  # Flaky web tests tagged @quarantine. Report-only: NOT in quality-gate's
  # needs, and the test step is continue-on-error so a flaky failure never
  # turns the job (or the PR) red. They still run so we keep watching them.
  web-quarantine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run quarantined web tests (report-only)
        continue-on-error: true
        run: npx playwright test --project=web --grep @quarantine --pass-with-no-tests
        env:
          CI: 'true'
      - name: Test summary
        if: always()
        run: node scripts/ci-summary.mjs web-quarantine
      - name: Upload quarantine HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web-quarantine
          path: playwright-report/
          retention-days: 14

  quality-gate:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, security, api, web]
    steps:
      - run: echo "All quality gates passed ✅"

  # Publish the combined Allure test-health dashboard to GitHub Pages.
  # Runs on every push to master (pass or fail) so the public dashboard always
  # reflects the latest run and accumulates trend history.
  pages:
    if: ${{ always() && github.ref == 'refs/heads/master' && github.event_name == 'push' }}
    needs: [api, web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (landing page + allure-commandline dependency)
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Set up Java (the Allure CLI needs a JRE)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results
      - name: Download web Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-web
          path: allure-results
      - name: Load previous report (for trend history)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
      - name: Restore Allure history for trends
        run: |
          if [ -d gh-pages/allure/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/allure/history/. allure-results/history/
          fi
      - name: Generate Allure report into the site
        run: npx allure generate allure-results --clean -o site/allure
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          keep_files: true
